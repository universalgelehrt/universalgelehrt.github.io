<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Presentation – Hadis Software Solutions</title>

    <style>
        body {
            margin: 0;
            background-color: #0a0f1c;
            font-family: Arial, sans-serif;
            color: white;
        }

          /* NAVBAR */
          nav {
           position: sticky; /* keeps it on top when scrolling */
           top: 0;
           background-color: rgba(5, 8, 15, 0.95); /* semi-transparent dark */
           display: flex;
           justify-content: center;
           gap: 25px;
           padding: 15px 0;
           z-index: 1000; /* ensures navbar is above all content */
           border-bottom: 1px solid #00ffc3;
          }
        
          nav a {
            color: #00ffc3;
            text-decoration: none;
            font-weight: 600;
            transition: 0.3s;
          }
        
          nav a:hover, nav a.active {
            color: white;
            border-bottom: 2px solid #00ffc3;
          }

        /* FULL SCREEN HERO CENTER */
        .topbar {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
        }

        /* BIG CYBER TITLE */
        .title {
            font-size: 48px;
            font-weight: 800;
            color: #00ffc3;
            letter-spacing: 3px;
            text-shadow:
                0 0 10px rgba(0, 255, 195, 0.8),
                0 0 25px rgba(0, 255, 195, 0.5),
                0 0 40px rgba(0, 255, 195, 0.3);
            animation: glow 2s infinite alternate;
        }

        /* SUBTITLE */
        .subtitle {
            margin-top: 15px;
            font-size: 16px;
            color: rgba(255,255,255,0.7);
        }

        /* GLOW EFFECT */
        @keyframes glow {
            from {
                text-shadow: 0 0 10px #00ffc3;
            }
            to {
                text-shadow: 0 0 30px #00ffc3;
            }
        }

        /* Slide container */
        .container {
            display: flex;
            justify-content: center;
            align-items: center;
            height: calc(100vh - 50px);
        }

        iframe {
            width: 90%;
            height: 85vh;
            border: none;
            border-radius: 12px;
            box-shadow: 0 0 20px rgba(0, 255, 195, 0.3);
        }

        /* Footer */
        .footer {
            text-align: center;
            font-size: 12px;
            color: #888;
            padding: 10px;
        }
    </style>
</head>

    <script>
        window.addEventListener("load", () => {
        setTimeout(() => {
            document.querySelector(".topbar").style.display = "none";
        }, 1500); // hides after 1.5s
        });
    </script>
    
<body>

    <nav>
        <a href="index.html">Home</a>
        <a href="about.html">About</a>
        <a href="services.html">Services</a>
        <a href="contact.html">Contact</a>
        <a href="posts.html">Posts</a>
        <a href="presentation.html">Presentation</a>
    </nav>

    <div class="topbar">
        <div class="title">Hadis Software Solutions</div>
        <div class="subtitle">Cybersecurity • Architecture • Deep System Analysis</div>
    </div>

    <div class="container">
        <iframe
            src="https://docs.google.com/presentation/d/1C4cnRJiX6zrmxH30oQUHs8NRZJtm3l9Wvfl7sduMNf8/edit?slide=id.g3d7521bc495_2_83#slide=id.g3d7521bc495_2_83"
            allowfullscreen>
            onload="document.querySelector('.topbar').style.display='none';">
        </iframe>
    </div>

    <div class="footer">
        © 2026 Hadis Software Solutions
    </div>

</body>
</html>
