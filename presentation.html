<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Presentation – Hadis Software Solutions</title>
  <style>
    body {
      margin: 0;
      background-color: #0a0f1c;
      font-family: Arial, sans-serif;
      color: white;
    }

    /* Top bar */
    .topbar {
      background: #05080f;
      padding: 12px;
      text-align: center;
      border-bottom: 1px solid #00ffc3;
    }

    .title {
      color: #00ffc3;
      font-size: 18px;
      font-weight: bold;
    }

    /* Slide container */
    .container {
      display: flex;
      justify-content: center;
      align-items: center;
      height: calc(100vh - 50px);
    }

    iframe {
      width: 90%;
      height: 85vh;
      border: none;
      border-radius: 12px;
      box-shadow: 0 0 20px rgba(0, 255, 195, 0.3);
    }

    /* Footer */
    .footer {
      text-align: center;
      font-size: 12px;
      color: #888;
      padding: 10px;
    }
  </style>
</head>

<body>

  <div class="topbar">
    <div class="title">Hadis Software Solutions – Presentation</div>
  </div>

  <div class="container">
    <iframe 
      src="https://docs.google.com/presentation/d/1C4cnRJiX6zrmxH30oQUHs8NRZJtm3l9Wvfl7sduMNf8/edit?slide=id.g3d7521bc495_2_83#slide=id.g3d7521bc495_2_83"
      allowfullscreen>
    </iframe>
  </div>

  <div class="footer">
    © 2026 Hadis Software Solutions
  </div>

</body>
</html>
